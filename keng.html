<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keng's Biography</title>
    <style>
        /* CSS Styling */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #ece9e6, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            background-color: #3498db;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            font-weight: bold;
        }

        h1 {
            margin: 0;
            font-size: 2.2rem;
            color: #2c3e50;
        }

        .age-badge {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .bio-text {
            margin: 25px 0;
            line-height: 1.6;
            text-align: left;
            border-left: 4px solid #3498db;
            padding-left: 20px;
        }

        .skills-header {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: left;
        }

        .contact-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .contact-btn:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-pic">K</div>
        
        <h1>Keng</h1>
        <div class="age-badge">38 Years Old</div>

        <div class="bio-text">
            <p>Hello! I am <strong>Keng</strong>. I'm currently crafting my digital space. I believe it's never too late to learn new skills and share your story with the world.</p>
        </div>

        <div class="skills-header">Current Focus:</div>
        <p style="text-align: left; color: #666;">Web Development | UI Design | Personal Branding</p>

        <a href="mailto:your-email@example.com" class="contact-btn">Get In Touch</a>
    </div>

</body>
</html>
