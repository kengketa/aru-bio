<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keng's Bio</title>
    <style>
        /* Base Styles */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #fff5e6 0%, #ffdfba 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #4a4a4a;
        }

        /* The Bio Card */
        .card {
            background: #ffffff;
            width: 90%;
            max-width: 450px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 136, 0, 0.15);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Profile Area */
        .profile-initial {
            width: 100px;
            height: 100px;
            background: #ff8c00; /* Main Orange */
            color: white;
            font-size: 3rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.3);
            border: 4px solid #fff;
        }

        h1 {
            margin: 10px 0 5px 0;
            color: #333;
            font-size: 2.2rem;
        }

        .age-text {
            color: #ff8c00;
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Description Box */
        .bio-content {
            margin: 30px 0;
            padding: 20px;
            background: #fffaf0;
            border-radius: 15px;
            line-height: 1.7;
            text-align: left;
            border-left: 5px solid #ff8c00;
        }

        /* Button */
        .btn {
            display: inline-block;
            background: #ff8c00;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.2);
        }

        .btn:hover {
            background: #e67e00;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 140, 0, 0.4);
        }

        hr {
            border: 0;
            height: 1px;
            background: #eee;
            margin: 25px 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-initial">K</div>
        
        <h1>Keng</h1>
        <div class="age-text">38 Years Old</div>

        <div class="bio-content">
            Hello! I’m <strong>Keng</strong>. I’m currently updating my personal bio to reflect my journey. I believe in staying curious and keeping life vibrant.
        </div>

        <hr>

        <p style="font-size: 0.9rem; color: #888; margin-bottom: 20px;">
            Looking to collaborate or just want to say hi?
        </p>
        
        <a href="mailto:hello@example.com" class="btn">Message Me</a>
    </div>

</body>
</html>
