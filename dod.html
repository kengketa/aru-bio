<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .card {
        background: #fff;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        width: 90%;
        max-width: 400px;
        text-align: center;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        margin-bottom: 15px;
        object-fit: cover;
    }

    h2 {
        margin-bottom: 5px;
        color: #333;
    }

    .role {
        color: #777;
        margin-bottom: 15px;
    }

    .info {
        text-align: left;
        margin-bottom: 20px;
    }

    .info p {
        margin: 5px 0;
        color: #555;
    }

    .btn {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.05);
    }

    /* Responsive */
    @media (max-width: 480px) {
        .card {
            padding: 20px;
        }
    }
</style>

</head>
<body>

<div class="card">
    <img src="https://i.pravatar.cc/150" class="avatar">

    <h2>นาย ณเรศณ์ จิตรัตน์</h2>
    <div class="role">นักพัฒนาเว็บไซต์ (Web Developer)</div>

    <div class="info">
        <p><strong>อายุ:</strong> 48 ปี</p>
        <p><strong>อีเมล:</strong> narest@aru.ac.th</p>
        <p><strong>โทร:</strong> 0635162259</p>
        <p><strong>ที่อยู่:</strong> พระนครศรีอยุธยา ประเทศไทย</p>
    </div>

    <button class="btn">ติดต่อ</button>
</div>

</body>
</html>
