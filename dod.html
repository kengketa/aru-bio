<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern UI</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .card {
        background: #fff;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        text-align: center;
        width: 90%;
        max-width: 400px;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    h1 {
        margin-bottom: 10px;
        color: #333;
    }

    p {
        color: #777;
        margin-bottom: 20px;
    }

    .btn {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        border: none;
        padding: 12px 25px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        transition: all 0.3s ease;
    }

    .btn:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }

    /* 📱 Responsive */
    @media (max-width: 480px) {
        .card {
            padding: 20px;
        }

        h1 {
            font-size: 20px;
        }

        .btn {
            width: 100%;
        }
    }
</style>

</head>
<body>

<div class="card">
    <h1>Welcome 👋</h1>
    <p>หน้าเว็บดีไซน์สวยของ K.dod</p>
    <button class="btn">เริ่มต้นใช้งาน</button>
</div>

</body>
</html>
